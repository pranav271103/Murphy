site_name: MURPHY
site_url: https://pranav271103.github.io/Murphy/
site_description: The High-Speed Coding Predator. An agentic coding platform powered by dual-model orchestration.
repo_name: pranav271103/Murphy
repo_url: https://github.com/pranav271103/Murphy

theme:
  name: material
  logo: public/MurphyLogo.png
  favicon: public/MurphyLogo.png
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Home: index.md
  - 🛠️ Installation: installation.md
  - ⚡ Operation Manual: usage.md
  - 🧠 Predator Anatomy: architecture.md
  - 🔨 Tactical Tools: tools.md
  - 🤝 Tactical Contribution: contributing.md

extra_css:
  - stylesheets/extra.css
